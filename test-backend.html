<!DOCTYPE html>
<html>
<head>
    <title>Test Backend Connection</title>
</head>
<body>
    <h1>Testing Backend Connection</h1>
    <button onclick="testBackend()">Test Backend</button>
    <pre id="result"></pre>

    <script>
        async function testBackend() {
            const result = document.getElementById('result');
            result.textContent = 'Testing...';
            
            try {
                const response = await fetch('https://tinylearn-backend.onrender.com/api/health');
                const data = await response.json();
                result.textContent = 'SUCCESS!\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = 'ERROR:\n' + error.message;
            }
        }
    </script>
</body>
</html>
